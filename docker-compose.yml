services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: talentpilot
      POSTGRES_PASSWORD: sails123
      POSTGRES_DB: talentpilot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U talentpilot -d talentpilot" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://talentpilot:sails123@postgres:5432/talentpilot
      JWT_SECRET: ${JWT_SECRET:-test-secret-key-for-development-only}
      ALLOWED_ORIGINS: http://localhost:8080
      COOKIE_SECURE: "false"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
