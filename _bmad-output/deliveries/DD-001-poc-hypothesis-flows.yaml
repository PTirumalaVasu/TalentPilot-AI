# ---------------------------------------------------------------------------
# Technical Requirements
# ---------------------------------------------------------------------------
technical_requirements:
  platform: "Desktop-primary web app (no mobile required; Rita and Casey both work from desktop/laptop)"
  stack:
    backend: "Python 3.12+ / FastAPI, domain-module structure (video_progress/, skill_matching/, auth/)"
    frontend: "React + TypeScript + Vite (SPA) — no Next.js/SSR (internal, authenticated, no SEO surface)"
    database: "PostgreSQL + pgvector (skill-to-tutorial matching), async SQLAlchemy 2.0 + asyncpg"
  integrations:
    - "YouTube IFrame API — polling-based getCurrentTime() for watch-position capture; sendBeacon on tab close/unload"
  data_models:
    - "assignments: employee, skill, content link, status (Assigned/In Progress/Completed), provenance type (Verified/Self-reported), created/updated timestamps"
    - "skill_progress: user_id, skill_id, watch_position, timestamp — conditional writes only (skip if incoming timestamp is not newer)"
    - "content_catalog + embeddings (pgvector) for skill-to-tutorial matching"
  performance:
    - "Dashboard loads in < 2 seconds"
    - "Content Discovery page + video player load in < 3 seconds"
    - "Assignment creation reflected on dashboard within 1 second of submission"
    - "Resume playback begins within 1 second of click (no seek lag)"
    - "Dashboard row updates within 30 seconds of a watch-position change (real-time, no manual refresh)"
  no_data_migration: "Dashboard starts clean on 2026-07-13 — historical spreadsheet data is not imported (confirmed decision)"
  privacy_constraint: "Auto-captured progress data is coaching-only — must never be exposed to or usable in performance-evaluation contexts. This is a data-access/reporting boundary, not just a copy/communication choice."

# ---------------------------------------------------------------------------
# Acceptance Criteria
# ---------------------------------------------------------------------------
acceptance_criteria:
  functional:
    - "Rita can view all employee skill assignments with a provenance label (Verified / Self-reported / Needs Attention) on the dashboard"
    - "Rita can drill down into any row to see raw signal data (assignment date, last activity, last self-report) and a plain-language explanation of the current status"
    - "Casey sees exactly one human-approved content recommendation per assigned skill (no search results)"
    - "Casey's watch position is auto-captured every 5-10s during playback and on tab close (sendBeacon)"
    - "Casey can resume a video at the exact last-watched position with a single click"
    - "Rita can assign a skill to an employee in a 3-step flow (employee -> skill -> auto-linked content review) and see it appear on the dashboard immediately"
  non_functional:
    - "WCAG AA: provenance labels always pair color with text/icon, never color-only"
    - "All interactive elements keyboard-navigable (grid, dropdowns, modals, video player controls)"
    - "No manual 'save' or 'sync' UI anywhere in the watch-tracking flow — all capture is passive/background"
  edge_cases:
    - "Empty state: no assignments yet (fresh pilot start) on Skills Dashboard and Continue Watching"
    - "Loading state: grid/card data not yet returned on all 3 scenarios' pages"
    - "Error state: data fetch failure (dashboard grid, provenance drill-down, content recommendation, employee/skill lists in assignment form)"
    - "Error state: video playback failure on Content Discovery / Continue Watching"
    - "Error state: dashboard fails to refresh after a successful assignment submission (assignment is not lost, only the visual update fails)"
    - "No approved content match found for a selected skill during assignment (03.1)"

# ---------------------------------------------------------------------------
# Testing Guidance
# ---------------------------------------------------------------------------
testing_guidance:
  user_testing: >
    Observe Rita completing a real staffing-readiness judgment using only the
    dashboard + drill-down (no spreadsheet cross-referencing) and Casey
    resuming a paused video without prompting. Watch for hesitation, manual
    verification habits, or confusion about what "Needs Attention" means.
  qa_scope: "Desktop browsers only (Chrome, Edge, Firefox latest) — no mobile/tablet testing required per platform constraint"
  design_validation: >
    Compare implementation against each page spec's Object Registry-equivalent
    (Components & Object IDs tables) and Page States table — confirm Loading/
    Empty/Error states are implemented, not just the happy path.

# ---------------------------------------------------------------------------
# Complexity & Risk
# ---------------------------------------------------------------------------
complexity:
  size: "L — 3 scenarios, 6 pages, real-time update pipeline, pgvector matching"
  dependencies:
    - "Self-hosted vs. third-party video embed decision still open — affects what 'auto-captured watch %' can technically mean (see project memory, unresolved as of 2026-07-08)"
  assumptions:
    - "design_system_mode: none is intentional for this pilot — no shared component library to build/maintain"
    - "Legal/compliance review of employee video-watch tracking was consciously declined for this internal-pilot scope (see project memory) — revisit if scope expands"
    - "No named owner or team/timeline commitment exists yet for post-pilot maintenance — accepted as open, to be resolved before Pilot & Validation phase, not before this build"
  risk_level: "Medium"
  risk_rationale: >
    Core UX flows and tech stack are well-specified and low-novelty (FastAPI/
    React/Postgres+pgvector is a well-trodden combination). Risk sits in two
    places: (1) the real-time dashboard-update pipeline (watch-position write
    -> dashboard row update within 30s) is the most technically novel piece
    and central to the POC hypothesis; (2) the coaching-only privacy boundary
    must be enforced at the data-access layer, not just in UI copy — getting
    this wrong is a trust failure, not a cosmetic one.
