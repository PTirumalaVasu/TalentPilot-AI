handoff_log: "deliveries/DD-001-handoff-log.md"

# ---------------------------------------------------------------------------
# User Value
# ---------------------------------------------------------------------------
user_value:
  problem: >
    HR (Rita) cannot trust the freshness of manually self-reported skill
    progress and must cross-reference constantly before making staffing
    decisions. Employees (Casey) get no credit for progress unless they
    manually log it, and lose their place when they stop watching training
    content. Assigning skills is manual and disconnected from tracking.
  solution: >
    Three POC flows demonstrate the core mechanic: (1) provenance-labeled
    dashboard rows (Verified / Self-reported / Needs Attention) let Rita make
    a staffing call without cross-referencing; (2) frictionless content
    discovery + auto-captured, resumable video watch progress generates
    honest signal with zero manual logging; (3) a 3-step assignment flow with
    auto-linked content closes the loop, updating Rita's dashboard instantly
    and in real time as Casey engages.
  success_criteria:
    - "Dashboard staleness (rows without a fresh verified signal) below 5% within 60 days of launch"
    - "Rita completes a skill assignment in under 2 minutes (3-step form)"
    - "Casey resumes a video at the exact last-watched position with no seeking/searching"
    - "Rita's dashboard row updates automatically within 30 seconds of Casey's watch-position change, with no manual refresh"

