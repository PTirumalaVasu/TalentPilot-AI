page_purpose: |
  Let Casey seamlessly resume watching an in-progress skill from the exact
  last-watched position, with no manual seeking or "resume or start over"
  friction.

user_context:
  - "Casey previously started watching and left partway through"
  - "Casey returns via nav, notification, or direct visit"

success_criteria:
  - "Casey sees the exact resume timestamp and clicks Resume with zero friction"
  - "Progress bar and time-remaining give a quick sense of where they left off"

demo_data_needed:
  current_user:
    firstName: "Casey"
  source: "../data/demo-data.js (window.DEMO_DATA.continueWatching) — 51% / 14:32 of 28:00, matching the spec's own worked example"

