<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>Sign In - TalentPilot-AI</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config (Design Tokens) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'talentpilot': {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 font-sans flex items-center justify-center p-4">

    <div class="max-w-sm w-full bg-white rounded-lg shadow-sm border border-gray-200 p-8">
        <div class="text-center mb-6">
            <div class="font-bold text-lg text-gray-900 mb-1">TalentPilot-AI</div>
            <p class="text-sm text-gray-500">Sign in to continue</p>
        </div>

        <div id="login-wrong-role-notice" class="hidden text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4"></div>
        <div id="login-error-notice" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
            Incorrect email or password.
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label for="login-email" class="block text-xs font-medium text-gray-600 mb-1">Email</label>
                <input type="email" id="login-email" autocomplete="username"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
                       placeholder="you@sailssoftware.com" required>
            </div>
            <div>
                <label for="login-password" class="block text-xs font-medium text-gray-600 mb-1">Password</label>
                <input type="password" id="login-password" autocomplete="current-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" required>
            </div>
            <button type="submit"
                    class="w-full bg-talentpilot-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-talentpilot-700 transition-colors">
                Sign In
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-gray-100 text-xs text-gray-500">
            <p class="font-medium text-gray-600 mb-1">Demo accounts (password: demo123)</p>
            <ul class="space-y-0.5">
                <li>rita@sailssoftware.com — HR</li>
                <li>casey@sailssoftware.com — Employee</li>
                <li>morgan@sailssoftware.com — Employee</li>
                <li>jordan@sailssoftware.com — Employee</li>
                <li>sam@sailssoftware.com — Employee</li>
            </ul>
        </div>
    </div>

    <script src="shared/auth.js"></script>
    <script>
        // This folder (Casey's Resume & Watch) only contains an Employee view.
        const HR_HOME = null;
        const EMPLOYEE_HOME = '02.1-Content-Discovery.html';

        function showWrongRoleNotice(message) {
            const el = document.getElementById('login-wrong-role-notice');
            el.textContent = message;
            el.classList.remove('hidden');
        }

        // Redirect-back from a page whose role didn't match this folder's session
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'wrong_role') {
            showWrongRoleNotice("That account doesn't have a view in this demo folder — try a different demo account below.");
        }

        // Already logged in with a role this folder supports? Skip the form.
        (function () {
            const existing = TalentPilotAuth.getSession();
            if (existing) {
                if (existing.role === 'HR' && HR_HOME) {
                    window.location.replace(HR_HOME);
                } else if (existing.role === 'Employee' && EMPLOYEE_HOME) {
                    window.location.replace(EMPLOYEE_HOME);
                }
            }
        })();

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            document.getElementById('login-error-notice').classList.add('hidden');
            document.getElementById('login-wrong-role-notice').classList.add('hidden');

            const session = TalentPilotAuth.login(email, password);
            if (!session) {
                document.getElementById('login-error-notice').classList.remove('hidden');
                return;
            }

            if (session.role === 'HR' && HR_HOME) {
                window.location.href = HR_HOME;
            } else if (session.role === 'Employee' && EMPLOYEE_HOME) {
                window.location.href = EMPLOYEE_HOME;
            } else {
                showWrongRoleNotice(
                    session.role === 'HR'
                        ? "Signed in as HR, but this demo folder doesn't include an HR view. Open Rita's Trust Call or Assignment & Track prototype instead."
                        : "Signed in as an Employee, but this demo folder doesn't include an Employee view."
                );
            }
        });
    </script>
</body>
</html>
