<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>02.1 Content Discovery - TalentPilot-AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'talentpilot': {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <!-- ========================================================================
         HEADER (Section 1)
         ======================================================================== -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="#" id="content-discovery-logo" data-object-id="content-discovery-logo"
               class="flex items-center gap-2 font-bold text-lg text-gray-900">TalentPilot-AI</a>
            <nav id="content-discovery-nav-primary" data-object-id="content-discovery-nav-primary" class="flex gap-6 text-sm">
                <a href="#" class="text-talentpilot-600 font-medium border-b-2 border-talentpilot-600 pb-3 -mb-3">Assignments</a>
                <a href="02.2-Continue-Watching.html" class="text-gray-600 hover:text-gray-900 pb-3 -mb-3 transition-colors">Continue Watching</a>
            </nav>
        </div>
        <div id="content-discovery-user-menu" data-object-id="content-discovery-user-menu" class="relative">
            <button type="button" onclick="toggleUserMenu()" class="flex items-center gap-2 text-sm text-gray-700">
                <span class="w-8 h-8 rounded-full bg-talentpilot-100 flex items-center justify-center text-talentpilot-700 font-medium">C</span>
                Casey
            </button>
            <div class="hidden absolute right-0 mt-2 w-40 bg-white border border-gray-200 rounded-lg shadow-lg z-10" data-dropdown>
                <a href="#" onclick="handleSignOut()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">Sign Out</a>
            </div>
        </div>
    </header>

    <!-- ========================================================================
         MAIN CONTENT (filled in by Section 2 onward)
         ======================================================================== -->
    <main id="page-main-content" class="px-6 py-6 max-w-2xl mx-auto">
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div id="content-discovery-card-header" data-object-id="content-discovery-card-header" class="mb-4">
                <h2 class="text-lg font-semibold text-gray-900" id="card-skill-title"></h2>
                <p class="text-sm text-gray-500" id="card-status"></p>
            </div>

            <p id="content-discovery-recommendation-label" data-object-id="content-discovery-recommendation-label"
               class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Recommended Content</p>

            <div class="flex gap-4">
                <div id="content-discovery-thumbnail" data-object-id="content-discovery-thumbnail"
                     class="w-40 h-24 bg-gray-200 rounded-lg flex items-center justify-center flex-shrink-0 cursor-pointer"
                     onclick="handlePlay()">
                    <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <h3 id="content-discovery-content-title" data-object-id="content-discovery-content-title"
                        class="font-medium text-gray-900"></h3>
                    <div class="flex items-center gap-2 text-sm text-gray-500 mt-1">
                        <span id="content-discovery-source-badge" data-object-id="content-discovery-source-badge"></span>
                        <span>·</span>
                        <span id="content-discovery-duration" data-object-id="content-discovery-duration"></span>
                        <span id="content-discovery-approval-badge" data-object-id="content-discovery-approval-badge"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 cursor-help"
                              title="This content was reviewed and approved by Rita before being recommended to you.">✓ Approved</span>
                    </div>
                    <p id="content-discovery-description" data-object-id="content-discovery-description"
                       class="text-sm text-gray-600 mt-2"></p>
                </div>
            </div>

            <div class="flex items-center gap-4 mt-6">
                <button id="content-discovery-btn-play" data-object-id="content-discovery-btn-play"
                        onclick="handlePlay()"
                        class="bg-talentpilot-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-talentpilot-700 transition-colors">
                    ▶ Play
                </button>
                <a href="#" id="content-discovery-btn-alternatives" data-object-id="content-discovery-btn-alternatives"
                   onclick="handleAlternatives()"
                   class="text-sm text-talentpilot-600 hover:underline">View alternatives</a>
            </div>
        </div>

        <div class="flex items-center justify-between mt-4 text-sm text-gray-500">
            <span id="content-discovery-contact-info" data-object-id="content-discovery-contact-info"></span>
            <span id="content-discovery-progress-indicator" data-object-id="content-discovery-progress-indicator"></span>
        </div>

        <!-- Loading skeleton (Section 3) -->
        <div id="card-loading-state" class="hidden bg-white rounded-lg shadow-sm p-6 space-y-3">
            <div class="h-5 bg-gray-100 rounded animate-pulse w-1/2"></div>
            <div class="h-24 bg-gray-100 rounded animate-pulse w-full"></div>
        </div>

        <!-- Empty state (Section 3) -->
        <div id="card-empty-state" class="hidden text-center py-12 border-2 border-dashed border-gray-200 rounded-lg text-gray-500">
            No recommended content yet for this skill. <a href="#" class="text-talentpilot-600 underline">Contact Rita</a>
        </div>

        <!-- Error state (Section 3) -->
        <div id="card-error-state" class="hidden text-center py-12 border-2 border-dashed border-red-200 rounded-lg text-red-600">
            This video couldn't be loaded.
            <button onclick="loadAssignment()" class="underline font-medium ml-1">Try again</button>
            · <a href="#" onclick="handleAlternatives()" class="underline">View alternatives</a>
        </div>
    </main>

    <!-- ========================================================================
         JAVASCRIPT - Shared Scripts
         ======================================================================== -->
    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/init.js"></script>
    <script src="components/dev-mode.js"></script>

    <!-- ========================================================================
         JAVASCRIPT - Page-Specific Script
         ======================================================================== -->
    <script>
        /**
         * Page: 02.1 Content Discovery
         * Purpose: Casey sees the assigned skill with one human-approved
         *          content recommendation and starts watching immediately.
         */

        window.initPage = function() {
            console.log('📄 02.1 Content Discovery loaded');
            loadAssignment();
        };

        function getDemoStateParam() {
            return new URLSearchParams(window.location.search).get('demo_state');
        }

        function setCardState(state) {
            // state: 'loading' | 'loaded' | 'empty' | 'error'
            document.getElementById('card-loading-state').classList.toggle('hidden', state !== 'loading');
            document.getElementById('card-empty-state').classList.toggle('hidden', state !== 'empty');
            document.getElementById('card-error-state').classList.toggle('hidden', state !== 'error');
            document.querySelector('#page-main-content > .bg-white').classList.toggle('hidden', state !== 'loaded');
        }

        async function loadAssignment() {
            const forcedState = getDemoStateParam();

            if (forcedState === 'loading') { setCardState('loading'); return; }
            if (forcedState === 'error') { setCardState('error'); return; }
            if (forcedState === 'empty') { setCardState('empty'); return; }

            setCardState('loading');
            const a = await PrototypeAPI.getContentDiscovery();
            console.log('📦 Content Discovery data:', a);

            document.getElementById('card-skill-title').textContent = a.skillName;
            document.getElementById('card-status').textContent = a.status;
            document.getElementById('content-discovery-content-title').textContent = a.content.title;
            document.getElementById('content-discovery-source-badge').textContent = a.content.source;
            document.getElementById('content-discovery-duration').textContent = `${a.content.durationMinutes} minutes`;
            document.getElementById('content-discovery-description').textContent = a.content.description;
            document.getElementById('content-discovery-contact-info').textContent = 'Questions? Contact Rita';
            document.getElementById('content-discovery-progress-indicator').textContent = '0% watched';
            setCardState('loaded');
        }

        function handlePlay() {
            console.log('▶ Play clicked — would launch video player at 0:00 (real player out of scope for this prototype)');
        }

        function handleAlternatives() {
            console.log('ℹ️ View alternatives clicked (browse UI not built — out of scope for this prototype)');
        }

        function toggleUserMenu() {
            document.querySelector('[data-dropdown]').classList.toggle('hidden');
        }

        function handleSignOut() {
            console.log('👋 Sign out clicked (prototype no-op)');
        }

        // User menu: close on click-outside (Section 4)
        document.addEventListener('click', (e) => {
            const userMenu = document.getElementById('content-discovery-user-menu');
            const dropdown = userMenu.querySelector('[data-dropdown]');
            if (!userMenu.contains(e.target) && !dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
