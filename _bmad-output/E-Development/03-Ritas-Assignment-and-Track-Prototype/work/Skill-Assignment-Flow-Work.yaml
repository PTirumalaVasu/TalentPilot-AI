    - "skills-dashboard-btn-new-assignment (currently a stub — Section 6 wires it to open this modal)"

sections:
  - id: "section-1"
    name: "Modal Structure & Step 1 (Employee)"
    scope: "Modal chrome (header, progress, close), Step 1 employee dropdown/list/continue"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: []
    object_ids:
      - "skill-assignment-flow-header-title"
      - "skill-assignment-flow-progress-indicator"
      - "skill-assignment-flow-btn-close"
      - "skill-assignment-flow-step1-title"
      - "skill-assignment-flow-employee-dropdown"
      - "skill-assignment-flow-employee-list"
      - "skill-assignment-flow-btn-continue-step1"
    acceptance_criteria:
      - "Modal shows 'Assign a New Skill', 'Step 1 of 3'"
      - "Employee dropdown lists Casey, Morgan, Jordan, Sam"
      - "Selecting an employee enables Continue"
    placeholder_message: "🚧 Building Step 2 next..."

  - id: "section-2"
    name: "Step 2 (Skill Selection)"
    scope: "Skill search/list, continue button"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: ["section-1"]
    object_ids:
      - "skill-assignment-flow-step2-title"
      - "skill-assignment-flow-skill-search"
      - "skill-assignment-flow-skill-list"
      - "skill-assignment-flow-btn-continue-step2"
    acceptance_criteria:
      - "Skill list shows Python Basics, Data Visualization Fundamentals, Advanced SQL"
      - "Selecting a skill enables Continue and fetches auto-linked content"
    placeholder_message: "🚧 Building Step 3 next..."

  - id: "section-3"
    name: "Step 3 (Content Review)"
    scope: "Auto-linked content display, footer Assign/Cancel"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: ["section-2"]
    object_ids:
      - "skill-assignment-flow-step3-title"
      - "skill-assignment-flow-content-label"
      - "skill-assignment-flow-content-thumbnail"
      - "skill-assignment-flow-content-title"
      - "skill-assignment-flow-content-source"
      - "skill-assignment-flow-content-duration"
      - "skill-assignment-flow-content-approval"
      - "skill-assignment-flow-content-description"
      - "skill-assignment-flow-btn-view-content"
      - "skill-assignment-flow-btn-change-content"
      - "skill-assignment-flow-btn-assign"
      - "skill-assignment-flow-btn-cancel"
    acceptance_criteria:
      - "Content auto-populated based on skill selection (e.g. Python Basics -> Python Basics for Beginners)"
      - "Approval badge always shown"
      - "[Assign] enabled once employee+skill selected"
    placeholder_message: "🚧 Adding loading/empty/error states next..."

  - id: "section-4"
    name: "Modal Loading/Empty/Error States"
    scope: "The 3 non-happy-path states from the retrofit"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: ["section-3"]
    object_ids: []
    acceptance_criteria:
      - "Loading: skeleton in place of dropdown/list options"
      - "Empty: 'No approved content found yet for this skill. [Choose Different Content] or assign without content.'"
      - "Error: \"Couldn't load [employees/skills/content]. [Retry]\""
    placeholder_message: "🚧 Wiring assignment creation next..."

  - id: "section-5"
    name: "Assignment Creation + Toast/New Row Highlight"
    scope: "Wire [Assign] click -> PrototypeAPI.createAssignment() -> close modal -> re-render grid -> toast -> highlight new row"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: ["section-3"]
    object_ids:
      - "assignment-confirmation-toast"
      - "assignment-confirmation-new-row-highlight"
    acceptance_criteria:
      - "New row (Casey, Python Basics, 'Assigned · Awaiting first watch', 0%) appears in the grid immediately"
      - "Toast shows '✓ Skill assigned to Casey — Python Basics', auto-dismisses after 3-5s"
      - "New row is visually highlighted (background color or badge)"
    placeholder_message: "🚧 Final interactions next..."

  - id: "section-6"
    name: "Interactions & Polish"
    scope: "Wire [+ New Assignment] button to open this modal (replacing the Scenario 01 stub); Escape/click-outside for this modal, coexisting with the existing Provenance modal"
    files_affected: ["03-Skills-Dashboard.html"]
    dependencies: ["section-1", "section-2", "section-3", "section-4", "section-5"]
    object_ids: []
    acceptance_criteria:
      - "[+ New Assignment] opens the Skill Assignment Flow modal (no longer just logs to console)"
      - "Escape/click-outside closes whichever modal is currently open, not both simultaneously"
      - "Cancel button at any step closes without creating an assignment"
    placeholder_message: "🚧 Final integration test..."

migration_todos:
