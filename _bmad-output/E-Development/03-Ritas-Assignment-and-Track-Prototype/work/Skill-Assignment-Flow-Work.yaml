metadata:
  page_number: "03.1 + 03.2"
  page_name: "Skill Assignment Flow modal + Toast/New Row Highlight (on the Skills Dashboard)"
  scenario: "03-Ritas-Assignment-and-Track"
  complexity: "medium"
  estimated_sections: 6
  estimated_time: "95 minutes"

  device_compatibility:
    type: "desktop-only"
    primary_viewport: "1280px"
    breakpoints: []
    touch_optimized: false
    hover_interactions: true

  dependencies:
    - "shared/prototype-api.js (extended with getContentForSkill, createAssignment)"
    - "shared/init.js"
    - "shared/utils.js"

design_tokens:
  tailwind_config:
    theme_extend:
      colors:
        "talentpilot":
          50: "#eff6ff"
          500: "#2563eb"
          600: "#1d4ed8"
          700: "#1e40af"

page_purpose: |
  Let Rita assign a skill to an employee in under 2 minutes via a 3-step
  form (employee -> skill -> auto-linked content review), with the new
  assignment appearing immediately on the dashboard with confirmation.

success_criteria:
  - "Rita completes the assignment in under 2 minutes"
  - "Content is auto-linked, never requiring manual search in the primary flow"
  - "New row appears immediately, highlighted, with a toast confirmation"

demo_data_needed:
  source: "../data/demo-data.js — employees, skills, content_catalog, existing assignments"
  example_flow: "Rita assigns Casey -> Python Basics -> auto-linked 'Python Basics for Beginners'"

object_ids:
  modal_chrome:
    - "skill-assignment-flow-header-title"
    - "skill-assignment-flow-progress-indicator"
    - "skill-assignment-flow-btn-close"
  step1_employee:
