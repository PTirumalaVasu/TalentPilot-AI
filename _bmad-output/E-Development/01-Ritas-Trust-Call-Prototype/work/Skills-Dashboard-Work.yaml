# ============================================================================
# SECTION BREAKDOWN (implementation order)
# ============================================================================

sections:
  - id: "section-1"
    name: "Page Structure & Header"
    scope: "HTML skeleton, header (logo/nav/user menu dropdown), toolbar with [+ New Assignment] button"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: []
    object_ids:
      - "skills-dashboard-logo"
      - "skills-dashboard-nav-primary"
      - "skills-dashboard-user-menu"
      - "skills-dashboard-btn-new-assignment"
    tailwind_classes:
      - "Layout: min-h-screen, bg-gray-50"
      - "Header: bg-white, border-b, px-6, py-3, flex, items-center, justify-between"
      - "Nav: flex, gap-6, text-gray-600, hover:text-gray-900"
    acceptance_criteria:
      - "Header displays logo, primary nav (Dashboard/Assignments), user menu"
      - "User menu opens/closes on click, Sign Out item present"
      - "[+ New Assignment] button visible in toolbar (click wired in Section 6)"
    placeholder_message: "🚧 Building the dashboard grid next..."

  - id: "section-2"
    name: "Skills Grid — Loaded State"
    scope: "Grid rows with provenance labels, summary count, pagination, footer"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: ["section-1"]
    object_ids:
      - "skills-dashboard-heading-title"
      - "skills-dashboard-summary-count"
      - "skills-dashboard-grid-skills"
      - "skills-dashboard-pagination-controls"
      - "skills-dashboard-version-info"
    tailwind_classes:
      - "Grid: w-full, border-collapse, text-sm"
      - "Row: border-b, hover:bg-gray-50"
      - "Provenance label: inline-flex, items-center, gap-1, px-2, py-0.5, rounded-full, text-xs, font-medium (color varies by status, always paired with text)"
    acceptance_criteria:
      - "All 4 demo assignments render (Casey/Morgan/Jordan/Sam) from demo-data.js"
      - "Provenance labels are color + text, never color-only (Verified=green, Self-reported=gray, Needs Attention=amber)"
      - "Drill-down arrow present on each row (click wired in Section 6)"
    placeholder_message: "🚧 Adding loading/empty/error states next..."

  - id: "section-3"
    name: "Grid — Loading / Empty / Error States"
    scope: "The 3 non-happy-path dashboard states from the Phase 4 validation retrofit"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: ["section-2"]
    object_ids: []
    tailwind_classes:
      - "Loading: animate-pulse, bg-gray-200 skeleton rows"
      - "Empty/Error message: text-center, text-gray-500, py-12"
    acceptance_criteria:
      - "Loading state shows skeleton rows, header/nav remain interactive"
      - "Empty state shows 'No assignments yet — click + New Assignment to get started'"
      - "Error state shows 'Couldn't load assignments. [Retry]' and Retry re-attempts the fetch"
    placeholder_message: "🚧 Building the Provenance Drill-Down modal next..."

  - id: "section-4"
    name: "Provenance Drill-Down Modal — Open State"
    scope: "Modal header, employee/skill identifiers, provenance summary, raw signal data, plain-language explanation, close button"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: ["section-2"]
    object_ids:
      - "assignment-details-header-id"
      - "assignment-details-btn-close"
      - "assignment-details-employee-name"
      - "assignment-details-skill-name"
      - "assignment-details-provenance-summary"
      - "assignment-details-raw-signal"
      - "assignment-details-explanation"
      - "assignment-details-actions"
    tailwind_classes:
      - "Modal overlay: fixed, inset-0, bg-black/40, flex, items-center, justify-center"
      - "Modal panel: bg-white, rounded-lg, shadow-xl, max-w-lg, p-6"
    acceptance_criteria:
      - "Clicking a row's drill-down arrow opens the modal with that row's data"
      - "Modal shows assignment date, last activity, and plain-language explanation text"
      - "Explanation text matches the tone rules in the spec (factual, no interpretation beyond what's stated)"
    placeholder_message: "🚧 Adding modal loading/error states next..."

  - id: "section-5"
    name: "Modal — Loading / Error States"
    scope: "The 2 non-happy-path modal states from the retrofit"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: ["section-4"]
    object_ids: []
    tailwind_classes:
      - "Loading: animate-pulse skeleton inside modal body"
      - "Error message: text-red-600, text-sm"
    acceptance_criteria:
      - "Loading state shows header immediately with a body-area loading placeholder"
      - "Error state shows 'Couldn't load provenance details. [Retry]', Close still works"
    placeholder_message: "🚧 Wiring interactions next..."

  - id: "section-6"
    name: "Interactions & Polish"
    scope: "Wire dashboard→modal open/close, nav dropdown, pagination clicks, Escape/click-outside handling, dev-mode Object ID overlay"
    files_affected: ["01.1-Skills-Dashboard.html"]
    dependencies: ["section-1", "section-2", "section-3", "section-4", "section-5"]
    object_ids: []
    tailwind_classes: []
    acceptance_criteria:
      - "Drill-down arrow click opens modal with correct row's data"
      - "X button, Escape key, and click-outside all close the modal"
      - "User menu dropdown opens/closes on click"
      - "Pagination controls change the displayed page (demo data can be a single page — verify no-op is graceful)"
      - "Dev-mode Shift+Click copies Object IDs to clipboard for handoff reference"
    placeholder_message: "🚧 Final integration test..."

