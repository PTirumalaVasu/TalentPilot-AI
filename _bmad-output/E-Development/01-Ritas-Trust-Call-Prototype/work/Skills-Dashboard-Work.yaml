  page_name: "Skills Dashboard (with Provenance Drill-Down modal)"
  scenario: "01-Ritas-Trust-Call"
  complexity: "medium"
  estimated_sections: 6
  estimated_time: "90 minutes"

  device_compatibility:
    type: "desktop-only"
    primary_viewport: "1280px"
    test_viewports:
      - width: 1280
        height: 800
        device: "Desktop (minimum)"
      - width: 1440
        height: 900
        device: "Desktop (laptop common)"
      - width: 1920
        height: 1080
        device: "Desktop (external monitor)"
    breakpoints: []
    touch_optimized: false
    hover_interactions: true

  dependencies:
    - "shared/prototype-api.js"
    - "shared/init.js"
    - "shared/utils.js"

# ============================================================================
# DESIGN TOKENS (Tailwind Config) — Generic Gray Model, no design system
# ============================================================================

design_tokens:
  colors:
    primary: "#2563eb"
    primary_hover: "#1d4ed8"
    success: "#10b981"
    warning: "#f59e0b"
    error: "#ef4444"
    gray_bg: "#f9fafb"

  tailwind_config:
    theme_extend:
      colors:
        "talentpilot":
          50: "#eff6ff"
          500: "#2563eb"
          600: "#1d4ed8"
          700: "#1e40af"
      fontFamily:
        sans: "['Inter', 'system-ui', 'sans-serif']"

  components_available:
    - "modal (components/modal.js)"
    - "toast (components/toast.js) — used later for 03.2, not required here"

# ============================================================================
# PAGE REQUIREMENTS (from specification)
# ============================================================================

page_purpose: |
  Let Rita scan employee skill assignments with provenance labels
  (Verified / Self-reported / Needs Attention) and drill into any row to see
  the raw signal data behind the label, so she can make a staffing-readiness
  decision without cross-referencing a spreadsheet.

user_context:
  - "Rita just logged in and clicked Skills Dashboard / Assignments from nav"
  - "She's under time pressure to answer a staffing question in minutes"
  - "She arrives skeptical about data freshness — the provenance labels are the trust mechanism"

success_criteria:
  - "Rita can distinguish Verified / Self-reported / Needs Attention rows at a glance (color + text, never color-only)"
  - "Clicking a drill-down arrow opens the modal with assignment date, last activity, and a plain-language explanation"
  - "Modal closes via X, Escape, or click-outside and always returns cleanly to the dashboard"
  - "Loading/Empty/Error states are implemented for both the grid and the modal, not just the happy path"

# ============================================================================
# DEMO DATA REQUIREMENTS
# ============================================================================

demo_data_needed:
  current_user:
    firstName: "Rita"
    lastName: "the Referee"
    role: "HR"

  source: "../data/demo-data.js (window.DEMO_DATA) — assignments array (Casey/Morgan/Jordan/Sam)"

  example_drill_down:
    employee: "Jordan"
    skill: "Data Visualization Fundamentals"
    provenance: "Self-reported · Not updated in 21 days"
    assignment_date: "2026-06-17"
    last_self_report: "In progress — 40% estimated (entered 2026-06-17)"
    explanation: "This skill was assigned 21 days ago. No video watch activity has been recorded since assignment. The employee's last self-reported update said '40% estimated,' but that entry was made on the same day as assignment and hasn't been updated since. The row is marked 'needs attention' because the signal is stale and we can't confirm current progress."

