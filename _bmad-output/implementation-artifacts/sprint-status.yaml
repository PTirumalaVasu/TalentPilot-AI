# story 3-6 implemented 2026-07-11 (bmad-dev-story): confirmed at Task 1 that AC1-4 were already correctly implemented by Story 3.4's handleClose()/Dialog close-handling -- zero production code changed. Added the real new work: 4 frontend tests (AssignmentModal.test.tsx: backdrop-click + Escape close without side effects at Step 1 and Step 3, reusing existing goToStep3()/mock patterns), 1 new backend test (test_assignment_cancel_no_orphan.py, private-engine pattern) driving the modal's real GET sequence (employees/skills/duplicate-check/content-match) against a live Postgres DB without ever calling POST /api/assignments, asserting zero orphaned Assignment rows -- the AC5 backend guarantee, no prototype equivalent existed to draw from. Duplicate-pair interstitial cancel-safety (View button) and the Step-3-after-both-reads-resolved case were both found already covered by pre-existing tests, no duplication added. Frontend 140/140 passing (up from 136), tsc clean modulo pre-existing Story 4.1/4.2 errors. Backend: new test + test_assignments_create_route.py (9/9) + test_assignments_router.py (12/12) all pass in isolation; test_content_router.py's 2 isolated failures confirmed pre-existing/unrelated via git stash comparison (identical failure with none of this story's changes present). Status -> review.
# story 3-6 code review completed 2026-07-11 (bmad-code-review, 3 parallel adversarial layers -- Blind Hunter, Edge Case Hunter, Acceptance Auditor; all three independently re-verified the "already implemented by Story 3.4" premise is true by reading the real production code): 0 decision-needed, 4 patches applied, 6 deferred, 6 dismissed. Headline finding: handleClose()'s submitting/duplicateChecking in-flight guard -- the only thing protecting backdrop-click/Escape from racing an in-flight request, since they bypass button disabled state entirely -- had zero test coverage; the exact scenario this review was commissioned to check. Fixed with 2 new tests. Also strengthened the 2 Step-3 backdrop/Escape tests to assert read-endpoint call counts stay unchanged after close (not just the write path), scoped down an overclaiming backend test docstring, and added a clarifying comment on Dialog's mousedown-not-click backdrop mechanic. 6 deferred items logged to deferred-work.md (Step 2/interstitial coverage, reopen-state-reset assertion, backend duplicate-exists-branch, POST atomicity testing, login-helper cookie edge case, cleanup try/finally edge case) -- none blocking. Frontend 142/142 passing (up from 136), tsc clean modulo pre-existing untouched files. Status -> done.
