# story 3-5 implemented 2026-07-11 (bmad-dev-story): all 8 ACs satisfied. Backend: GET /api/dashboard/assignments (HR-only, org-wide, eager-loaded employee/skill names, deterministic order) built end-to-end across assignments/repository.py, assignments/service.py, and dashboard/service.py+router.py (previously empty stubs) -- 4 new tests, all touched files pass 100% in isolation (full-suite run reproduces the pre-existing, already-documented cross-file asyncpg pool-corruption pattern, confirmed not a regression; also found and cleaned up one pre-existing leaked test-data row from an earlier session, unrelated to this story). Frontend: first toast primitive in the repo (components/ui/toast.tsx), a minimal explicitly-labeled placeholder dashboard list (features/dashboard/AssignmentsList.tsx, not Epic 5's final grid), and AssignmentModal.tsx's previously-unused onAssigned hook now wired end-to-end into DashboardStub.tsx for toast copy/4s row highlight/refresh-error handling -- 15 new/changed tests, full suite 115/115 passing (up from 93), tsc/build clean modulo pre-existing unrelated Story 4.1/4.2 errors. Caught and fixed a real design gap via this story's own tests (a failed post-create refetch was showing a redundant, contradictory error view stacked on top of the intended refresh-error banner). Live end-to-end verification against a real uvicorn+Postgres server confirmed the new row appears correctly in the dashboard list; no browser-automation tool available in this environment for a full visual pass (flagged, not skipped silently). Status -> review.
# story 3-5 code review completed 2026-07-11 (bmad-code-review, 3 parallel adversarial layers -- Blind Hunter, Edge Case Hunter, Acceptance Auditor): the diff first handed to the subagents got corrupted (git's LF/CRLF stderr warnings spliced into code lines mid-diff); regenerated cleanly and independently re-verified every finding against the real source before triaging -- none turned out to be a misread. Acceptance Auditor confirmed all 4 special-attention checks pass (no WDS prototype code lifted, no vanilla-JS leaked into React, toast/highlight/refresh-error copy match epics.md's exact text -- not the prototype's or UX-doc 03.2's diverging wording, no duplicate assignment-creation logic) and all 8 ACs pass. 1 decision resolved (toast now fires unconditionally on POST success, independent of whether the immediate dashboard refresh succeeds -- previously gated behind refetch success, which could suppress the toast even though the Assignment was genuinely saved), 5 patches applied (highlight-timer race + unmount leak fixed via a tracked/cleared ref; AssignmentsList.load()/refetch() gained a request-generation guard mirroring AssignmentModal.tsx's established tokenRef pattern, plus disabled-during-retry on both Retry buttons; table headers gained scope="col"; AssignmentModal's onAssigned fallback names made toast-safe), 2 deferred (double Depends(get_current_user) resolution -- matches an already-shipped identical pattern in assignments/router.py; no pagination on the dashboard query -- matches Story 3.4's already-accepted precedent), 8 dismissed. 6 new regression tests added. Frontend suite 121/121 passing (up from 115), tsc clean. Status -> done.
# story 2-5 corrected + created 2026-07-10 (bmad-create-story, user-requested CS+DS): epics.md's own Story 2.5 text was found stale mid-authoring -- a 2026-07-09 "tier-2 fix" had rewritten it into a single-assignment-card model citing a UX spec doc that was itself pre-pivot (already flagged in the implementation-readiness report). Corrected back to the PRD FR-4 / shipped-prototype multi-assignment grid model per explicit user decision. Story key renamed 2-5-content-discovery-single-assignment-card-view -> 2-5-content-discovery-multi-assignment-grid-view. New GET /api/assignments route (EMPLOYEE-only, gated to avoid an AD-2 bulk-progress-read violation via HR_ADMIN's unrestricted scope), composing content.service.match_content_for_skill (2.4) + ProgressService.get_progress (4.1) + a new ProgressService.derive_status seed of AD-3. Fresh-context review agent caught 3 critical gaps before dev-story (HR_ADMIN AD-2 leak, a get_progress call-site that didn't match ProgressService's actual class-based signature, Task 2's function-vs-staticmethod inconsistency) -- all fixed. Status -> ready-for-dev.
# story 2-5 implemented 2026-07-10/11 (bmad-dev-story): all 9 tasks complete -- eager-loaded Skill relationship (MissingGreenlet-safe), duration-aware ProgressService.derive_status, list_my_assignments composing content/progress service APIs behind an EMPLOYEE-only gate, GET /api/assignments router, real Content Discovery grid page + AssignmentWatch route wrapping the existing VideoPlayer. 6 new backend tests (179 total passing, zero regressions), 12 new frontend tests (83 total passing, zero regressions). Live browser verification (Playwright) against the real stack caught and fixed 2 real bugs: (1) content/schemas.py's ContentResponse.metadata leaking the DB column name "content_metadata" over HTTP instead of the schema's own documented "metadata" name -- dormant since Story 2.1, invisible until this story's route was content/router's first-ever real HTTP response; (2) a misleading "0% watched" badge on never-started assignments, fixed to "Not started yet". Visual comparison against 02.1-Content-Discovery.html completed per the Epic 1 retro action item. Status -> review.
